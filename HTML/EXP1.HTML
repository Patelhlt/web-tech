<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandit Deendayal Energy University</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        .sticker-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .sticker {
            width: 125px;
            height: 125px;
            background-size: cover;
            background-position: center;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .sticker:hover {
            transform: scale(1.1);
            border-color: #4CAF50;
        }

        footer {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to Pandit Deendayal Energy University</h1>
</header>

<main>
    <h2>Explore Our Beautiful Stickers</h2>
    <div class="sticker-gallery">
        <div class="sticker" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMNW1DwS6DoBYNgyrnKtG9i3B3mn0I1YkvAw&s');"></div>
        <div class="sticker" style="background-image: url('https://images.shiksha.com/mediadata/images/1586166306phpSrJaHw.jpeg');"></div>
        <div class="sticker" style="background-image: url('https://pdpu.ac.in/infra/9.jpg');"></div>
        <div class="sticker" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfrETbla_W8IBG568VSW07RYBkYt97UFSI_Q&s');"></div>
        <div class="sticker" style="background-image: url('https://via.placeholder.com/120?text=Sticker+5');"></div>
    </div>
</main>

<footer>
    <p>&copy; 2025 Pandit Deendayal Energy University. All rights reserved.</p>
</footer>

</body>
</html>
